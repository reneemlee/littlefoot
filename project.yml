name: LittleFoot
options:
  bundleIdPrefix: com.littlefoot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"
settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "4"
packages:
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    majorVersion: 2.0.0
targets:
  LittleFoot:
    type: application
    platform: iOS
    sources:
      - LittleFoot
    dependencies:
      - package: PhosphorSwift
    settings:
      DEVELOPMENT_TEAM: 6545L82DZR
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      PRODUCT_BUNDLE_IDENTIFIER: com.littlefoot.babyapp
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_CFBundleDisplayName: "Little Foot"
  LittleFootTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LittleFootTests
    dependencies:
      - target: LittleFoot
    settings:
      GENERATE_INFOPLIST_FILE: true
